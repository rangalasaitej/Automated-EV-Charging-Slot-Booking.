<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>India EV Slot Booking 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 10px; width: 380px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-view { border-top: 5px solid #007bff; display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .logout-btn { background: #6c757d; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="auth-layer" class="overlay">
        <div class="card" id="login-box">
            <h2>⚡ EV System Login</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p style="font-size:13px; margin-top:15px;">
                <span style="color:blue; cursor:pointer;" onclick="toggleAuth('signup')">New Account</span> | 
                <span style="color:red; cursor:pointer;" onclick="forgot()">Forgot Password?</span>
            </p>
        </div>

        <div class="card" id="signup-box" style="display:none;">
            <h2>Register Account</h2>
            <input type="text" id="s-phone" placeholder="Full Mobile Number">
            <input type="text" id="s-user" placeholder="Create Username">
            <input type="password" id="s-pass" placeholder="Create Password">
            <button onclick="handleSignup()">Create Account</button>
            <p style="font-size:13px; margin-top:15px; color:blue; cursor:pointer;" onclick="toggleAuth('login')">Back to Login</p>
        </div>
    </div>

    <div id="user-container" class="container">
        <h1 style="color:#007bff; text-align:center;">⚡ Book Your Slot</h1>
        <p style="text-align:center;">User: <span id="user-tag" style="font-weight:bold;"></span> | Dept of ECE</p>
        <hr>
        
        <label>Driver Details:</label>
        <input type="text" id="u-name" placeholder="Full Name">
        <input type="text" id="u-phone" placeholder="Contact Number">
        
        <label>Select Car Model:</label>
        <select id="car-list">
            <optgroup label="Maruti Suzuki"><option>Maruti Suzuki e Vitara (eVX)</option></optgroup>
            <optgroup label="Tesla"><option>Tesla Model 3</option><option>Tesla Model Y Premium</option></optgroup>
            <optgroup label="Luxury Brands"><option>BMW i4</option><option>BMW iX</option><option>Mercedes EQS</option><option>Audi Q8 e-tron</option></optgroup>
            <optgroup label="Mainstream"><option>Tata Nexon EV</option><option>MG Windsor EV</option><option>MG ZS EV</option><option>Mahindra XEV 9e</option></optgroup>
        </select>

        <label>Charging Options:</label>
        <select id="charger-type">
            <option>⚡ DC Fast Charging (High Speed)</option>
            <option>🔌 AC Normal Charging (Slow)</option>
        </select>

        <label>Select Slot & Start Time:</label>
        <div style="display: flex; gap: 10px;">
            <select id="slot-select" style="flex: 1;">
                <option value="1">Slot 1</option><option value="2">Slot 2</option>
                <option value="3">Slot 3</option><option value="4">Slot 4</option>
                <option value="5">Slot 5</option>
            </select>
            <input type="time" id="start-time" style="flex: 2;">
        </div>
        
        <button onclick="bookSlot()" style="background:#28a745; margin-top:20px;">Confirm Booking</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="admin-container" class="container admin-view">
        <h1 style="text-align:center; color:#007bff;">Admin Log (S@itej)</h1>
        <p style="text-align:center;">Total Station Occupancy: <span id="load" style="font-weight:bold;">0</span>/5</p>
        <table>
            <thead>
                <tr>
                    <th>Slot #</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Car Model</th>
                    <th>Charger</th>
                    <th>Start Time</th>
                </tr>
            </thead>
            <tbody id="admin-log"></tbody>
        </table>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
